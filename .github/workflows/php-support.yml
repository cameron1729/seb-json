name: Update PHP Support

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/php-support.json'

permissions: {}

concurrency:
  group: php-support-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  update:
    name: Update support policy
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: latest
          coverage: none
          extensions: dom, mbstring, simplexml, xml, xmlwriter
          tools: composer:v2

      - name: Update PHP support policy
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: php tools/php-support.php update

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Validate generated changes
        run: composer check

      - name: Create pull request
        id: pull-request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          add-paths: |
            .github/php-support.json
            README.md
            composer.json
          assignees: cameron1729
          branch: automation/php-support
          commit-message: Update PHP support
          delete-branch: true
          title: Update PHP support
          body: |
            Update the tested PHP range from Moodle's version-controlled release
            lifecycle, tagged Moodle requirements and official php-src tags.

            The lower bound is a backwards-compatibility change. Merge only
            after the dispatched CI matrix passes.

      - name: Run checks for generated branch
        if: >-
          steps.pull-request.outputs.pull-request-operation == 'created' ||
          steps.pull-request.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.pull-request.outputs.pull-request-branch }}
        run: |
          gh workflow run ci.yml --ref "$BRANCH"
          gh workflow run conformance.yml --ref "$BRANCH"

  refresh-renovate:
    name: Refresh Renovate changes
    if: >-
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'renovate/') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout Renovate branch # zizmor: ignore[artipacked] Credentials are required by the push step.
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: latest
          coverage: none
          extensions: dom, mbstring, simplexml, xml, xmlwriter
          tools: composer:v2

      - name: Regenerate PHP support policy
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: php tools/php-support.php update

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Validate generated changes
        run: composer check

      - name: Commit generated changes
        id: commit
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet -- .github/php-support.json README.md composer.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/php-support.json README.md composer.json
          git commit -m "Regenerate PHP support policy"
          git push origin "HEAD:${BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Run checks for generated branch
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          gh workflow run ci.yml --ref "$BRANCH"
          gh workflow run conformance.yml --ref "$BRANCH"
